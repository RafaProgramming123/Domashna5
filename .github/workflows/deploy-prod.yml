name: Deploy Prod

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  GHCR_NAMESPACE: rafaprogramming123
  IMAGE_BACKEND: ghcr.io/rafaprogramming123/backend:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image (prod)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Prod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            export GHCR_USER=${{ github.repository_owner }}
            export GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
            export GHCR_NAMESPACE=${{ env.GHCR_NAMESPACE }}
            export DB_USER=${{ secrets.PROD_DB_USER }}
            export DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            export DB_NAME=${{ secrets.PROD_DB_NAME }}

            docker login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"

            cd ${{ secrets.PROD_APP_PATH }}
            docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

